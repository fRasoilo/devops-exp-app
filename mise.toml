[tools]
k3d = "latest"
k9s = "latest"
kubectl = "latest"
pre-commit = "latest"
python = "3.13"
ruff = "latest"
trivy = "latest"
usage = "latest"
uv = "latest"

[settings]
python.uv_venv_auto = true
idiomatic_version_file_enable_tools = ["python"]
experimental = true
[env]
APP_REPO = 'devops-exp-app'
GITOPS_REPO = 'devops-exp-app-gitops'

[hooks]
enter = "bash ./scripts/setup_project"

[tasks.k8s-setup-local]
description = "Setup a Kubernetes cluster for that builds the local images and applies them"
run = "bash ./kubernetes/setup_cluster_local"

[tasks.k8s-setup-minimal]
description = "Setup a minimal Kubernetes cluster" 
run = "bash ./kubernetes/setup_cluster_min"


[tasks.e2e-test]
description = "Run end to end testing on the Kubernetes deployment" 
run = "cd ./kubernetes && uv run e2e_test.py"
